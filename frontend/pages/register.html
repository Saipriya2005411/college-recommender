<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — CollegeFinder</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar scrolled" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo"><span class="logo-icon">🎓</span><span>CollegeFinder</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html">Home</a></li>
      <li><a href="colleges.html">Colleges</a></li>
    </ul>
    <div class="nav-auth" id="navAuth">
      <a href="login.html" class="btn-outline">Login</a>
      <a href="register.html" class="btn-primary">Register</a>
    </div>
    <button class="hamburger" id="hamburger">☰</button>
  </div>
</nav>

<div class="auth-page">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="auth-card glass-card" style="max-width:520px">
    <h1>Create Account 🎓</h1>
    <p class="subtitle">Join thousands of students finding their best-fit college.</p>
    <div id="errorBox" class="error-msg hidden"></div>
    <div id="successBox" class="success-msg hidden"></div>
    <form class="auth-form" id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your full name" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6"/>
      </div>
      <div class="form-grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" id="mobile" placeholder="10-digit number"/>
        </div>
        <div class="form-group">
          <label>State</label>
          <select id="state">
            <option value="">Select State</option>
            <option>Odisha</option><option>Delhi</option><option>Maharashtra</option>
            <option>Karnataka</option><option>Tamil Nadu</option><option>Telangana</option>
            <option>Rajasthan</option><option>Punjab</option><option>Gujarat</option>
            <option>Uttar Pradesh</option><option>West Bengal</option><option>Bihar</option>
            <option>Madhya Pradesh</option><option>Andhra Pradesh</option><option>Haryana</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn-primary auth-submit" id="regBtn">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="login.html">Sign in here</a></p>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  const err = document.getElementById('errorBox');
  const suc = document.getElementById('successBox');
  btn.textContent = 'Creating account...';
  btn.disabled = true;
  err.classList.add('hidden');
  suc.classList.add('hidden');

  const res = await api.register({
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
    mobile: document.getElementById('mobile').value,
    state: document.getElementById('state').value
  });

  if (res.ok && res.data.success) {
    Auth.login(res.data.token, res.data.user);
    suc.textContent = 'Account created! Redirecting to dashboard...';
    suc.classList.remove('hidden');
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  } else {
    err.textContent = res.data.message || 'Registration failed';
    err.classList.remove('hidden');
    btn.textContent = 'Create Account';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
