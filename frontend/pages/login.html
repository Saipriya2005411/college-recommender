<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — CollegeFinder</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar scrolled" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo"><span class="logo-icon">🎓</span><span>CollegeFinder</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html">Home</a></li>
      <li><a href="colleges.html">Colleges</a></li>
    </ul>
    <div class="nav-auth" id="navAuth">
      <a href="login.html" class="btn-outline active">Login</a>
      <a href="register.html" class="btn-primary">Register</a>
    </div>
    <button class="hamburger" id="hamburger">☰</button>
  </div>
</nav>

<div class="auth-page">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="auth-card glass-card">
    <h1>Welcome Back 👋</h1>
    <p class="subtitle">Sign in to access your dashboard and saved colleges.</p>
    <div id="errorBox" class="error-msg hidden"></div>
    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn-primary auth-submit" id="loginBtn">Sign In</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
    <p class="auth-switch" style="margin-top:8px; font-size:0.8rem; color: #64748b;">
      Demo: student@test.com / student123 &nbsp;|&nbsp; Admin: admin@collegefinder.com / admin123
    </p>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorBox');
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  err.classList.add('hidden');

  const res = await api.login({
    email: document.getElementById('email').value,
    password: document.getElementById('password').value
  });

  if (res.ok && res.data.success) {
    Auth.login(res.data.token, res.data.user);
    showToast('Login successful! Redirecting...', 'success');
    setTimeout(() => {
      window.location.href = res.data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
    }, 800);
  } else {
    err.textContent = res.data.message || 'Login failed';
    err.classList.remove('hidden');
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
